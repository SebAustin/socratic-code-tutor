<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1920px;
    height: 1080px;
    background: #F7F3EA;
  }
  .wrap {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Arial", sans-serif;
    color: #2B2622;
    text-align: center;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 76px;
    font-weight: 700;
    margin: 0 0 36px 0;
  }
  .rule {
    width: 140px;
    height: 4px;
    background: #C6432B;
    margin: 0 0 44px 0;
  }
  .links {
    font-size: 36px;
    line-height: 1.9;
    margin-bottom: 44px;
  }
  .links .url {
    font-family: "Menlo", "Courier New", monospace;
    color: #1C5E4A;
  }
  .meta {
    font-size: 30px;
    color: #6B6155;
    line-height: 1.7;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Socratic Code Tutor</h1>
    <div class="rule"></div>
    <div class="links">
      <div class="url">socratic-code-tutor.vercel.app</div>
      <div class="url">github.com/SebAustin/socratic-code-tutor</div>
    </div>
    <div class="meta">
      OpenAI Build Week &mdash; Education Track<br />
      Built with OpenAI Codex + GPT&#8209;5.6
    </div>
  </div>
</body>
</html>
