<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1920px;
    height: 1080px;
    background: #F7F3EA;
  }
  .wrap {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Arial", sans-serif;
    color: #2B2622;
  }
  .mark {
    font-size: 40px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #6B6155;
    margin-bottom: 28px;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 96px;
    font-weight: 700;
    margin: 0 0 30px 0;
    letter-spacing: -0.01em;
  }
  p {
    font-size: 42px;
    margin: 0;
    color: #4A423A;
  }
  .rule {
    width: 140px;
    height: 4px;
    background: #C6432B;
    margin: 40px 0;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">Socratic</div>
    <h1>Socratic Code Tutor</h1>
    <div class="rule"></div>
    <p>Debug it yourself. We&rsquo;ll only ask questions.</p>
  </div>
</body>
</html>
